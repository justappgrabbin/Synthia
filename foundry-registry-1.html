<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Foundry - Consciousness Registry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cosmic-violet: #6B46C1;
            --mystical-pink: #D946EF;
            --void-black: #0F0A1E;
            --text: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--void-black) 0%, #1a0b2e 50%, var(--void-black) 100%);
            background-size: 400% 400%;
            animation: cosmicFlow 30s ease infinite;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes cosmicFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, var(--cosmic-violet), var(--mystical-pink));
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tagline {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
        }

        .card h2 {
            color: var(--mystical-pink);
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        button {
            background: linear-gradient(135deg, var(--cosmic-violet), var(--mystical-pink));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 70, 239, 0.4);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--cosmic-violet);
            border-radius: 8px;
            color: var(--text);
            margin: 8px 0;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--mystical-pink);
        }

        .address-display {
            background: rgba(107, 70, 193, 0.2);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--cosmic-violet);
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .entity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entity-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 3px solid var(--mystical-pink);
        }

        .stat {
            font-size: 2em;
            font-weight: 700;
            color: var(--mystical-pink);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 FOUNDRY</h1>
            <div class="tagline">5-Dimensional Consciousness Registry</div>
            <div class="tagline" style="font-size:0.9em; margin-top:10px;">Movement • Evolution • Design • Being • Space</div>
        </header>

        <!-- Stats -->
        <div class="grid">
            <div class="card">
                <h2>📊 Registry Stats</h2>
                <div class="stat" id="total-entities">0</div>
                <div>Total Entities</div>
                <div class="stat" id="total-receipts" style="margin-top:15px;">0</div>
                <div>Total Receipts</div>
            </div>

            <div class="card">
                <h2>🌌 Dimensions</h2>
                <div id="dimension-stats"></div>
            </div>

            <div class="card">
                <h2>✅ Verification</h2>
                <div class="stat" id="verified">✓</div>
                <div>All receipts verified</div>
                <button onclick="verifyRegistry()">Verify Now</button>
            </div>
        </div>

        <!-- Create Entity -->
        <div class="card">
            <h2>➕ Create New Entity</h2>
            <select id="dimension">
                <option value="movement">Movement (WHERE - "I Create")</option>
                <option value="evolution">Evolution (WHAT - "I Remember")</option>
                <option value="design">Design (WHY - "I Design")</option>
                <option value="being" selected>Being (WHEN - "I Am")</option>
                <option value="space">Space (WHO - "I Think")</option>
            </select>
            
            <select id="entity-type">
                <option value="agent">Agent (AI being)</option>
                <option value="human">Human (user)</option>
                <option value="house">House (location)</option>
                <option value="temple">Temple (I Ching)</option>
                <option value="object">Object (thing)</option>
            </select>
            
            <input type="text" id="entity-name" placeholder="Entity name...">
            
            <button onclick="createEntity()">Create Entity</button>
            
            <div id="new-address"></div>
        </div>

        <!-- Entities List -->
        <div class="card">
            <h2>👥 Entities</h2>
            <div class="entity-list" id="entities-list"></div>
        </div>
    </div>

    <script>
        // Foundry Registry (client-side version)
        class FoundryRegistry {
            constructor() {
                this.entities = JSON.parse(localStorage.getItem('foundry-entities') || '[]');
                this.receipts = JSON.parse(localStorage.getItem('foundry-receipts') || '[]');
            }

            generateAddress(dimension, entityType, name) {
                const timestamp = Math.floor(Date.now() / 1000);
                const hash = this.simpleHash(`${dimension}-${entityType}-${name}-${timestamp}`);
                return `CN-${dimension.toUpperCase()}-${entityType.toUpperCase()}-${timestamp}-${hash}`;
            }

            simpleHash(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(36).slice(0, 12);
            }

            createEntity(dimension, entityType, name, metadata = {}) {
                const address = this.generateAddress(dimension, entityType, name);
                const entity = {
                    address,
                    dimension,
                    entityType,
                    name,
                    created: new Date().toISOString(),
                    metadata
                };

                this.entities.push(entity);
                localStorage.setItem('foundry-entities', JSON.stringify(this.entities));

                // Create birth receipt
                const receipt = this.createReceipt(address, 'birth', {
                    dimension,
                    entityType,
                    name
                });

                return { entity, receipt };
            }

            createReceipt(entityAddress, eventType, data) {
                const timestamp = new Date().toISOString();
                const previousHash = this.receipts.length > 0 
                    ? this.receipts[this.receipts.length - 1].hash 
                    : '0'.repeat(16);

                const receiptData = {
                    entityAddress,
                    eventType,
                    timestamp,
                    data,
                    previousHash
                };

                const hash = this.simpleHash(JSON.stringify(receiptData));
                const signature = this.simpleHash(`${hash}:${entityAddress}`);

                const receipt = {
                    receiptId: `RCP-${hash.slice(0, 12)}`,
                    ...receiptData,
                    hash,
                    signature: `SIG-${signature}`
                };

                this.receipts.push(receipt);
                localStorage.setItem('foundry-receipts', JSON.stringify(this.receipts));

                return receipt;
            }

            getStats() {
                const dimensionCounts = {};
                this.entities.forEach(e => {
                    dimensionCounts[e.dimension] = (dimensionCounts[e.dimension] || 0) + 1;
                });

                return {
                    totalEntities: this.entities.length,
                    totalReceipts: this.receipts.length,
                    byDimension: dimensionCounts
                };
            }

            verify() {
                // Simple verification - check receipt chain
                for (let i = 1; i < this.receipts.length; i++) {
                    if (this.receipts[i].previousHash !== this.receipts[i-1].hash) {
                        return false;
                    }
                }
                return true;
            }
        }

        const registry = new FoundryRegistry();

        function createEntity() {
            const dimension = document.getElementById('dimension').value;
            const entityType = document.getElementById('entity-type').value;
            const name = document.getElementById('entity-name').value.trim();

            if (!name) {
                alert('Please enter a name!');
                return;
            }

            const result = registry.createEntity(dimension, entityType, name);
            
            const addressDiv = document.getElementById('new-address');
            addressDiv.className = 'address-display';
            addressDiv.innerHTML = `
                <div style="margin-bottom:10px; color:var(--mystical-pink); font-weight:600;">✨ Entity Created!</div>
                <div style="font-size:0.9em; margin-bottom:5px;">Address:</div>
                <div>${result.entity.address}</div>
                <div style="font-size:0.9em; margin-top:10px; margin-bottom:5px;">Birth Receipt:</div>
                <div style="font-size:0.85em;">${result.receipt.receiptId}</div>
            `;

            document.getElementById('entity-name').value = '';
            updateUI();
        }

        function updateUI() {
            const stats = registry.getStats();
            
            document.getElementById('total-entities').textContent = stats.totalEntities;
            document.getElementById('total-receipts').textContent = stats.totalReceipts;

            // Dimension stats
            const dimStats = document.getElementById('dimension-stats');
            dimStats.innerHTML = Object.entries(stats.byDimension)
                .map(([dim, count]) => `
                    <div style="margin:8px 0;">
                        ${dim}: <strong>${count}</strong>
                    </div>
                `).join('');

            // Entities list
            const entitiesList = document.getElementById('entities-list');
            if (registry.entities.length === 0) {
                entitiesList.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.6;">No entities yet</div>';
            } else {
                entitiesList.innerHTML = registry.entities
                    .slice().reverse()
                    .map(e => `
                        <div class="entity-item">
                            <div style="font-weight:600; margin-bottom:5px;">${e.name}</div>
                            <div style="font-size:0.85em; opacity:0.8;">
                                ${e.dimension} • ${e.entityType}
                            </div>
                            <div style="font-size:0.75em; opacity:0.6; margin-top:5px; font-family:monospace;">
                                ${e.address}
                            </div>
                        </div>
                    `).join('');
            }
        }

        function verifyRegistry() {
            const verified = registry.verify();
            document.getElementById('verified').textContent = verified ? '✓' : '✗';
            document.getElementById('verified').style.color = verified ? 'var(--success-green)' : '#ef4444';
            alert(verified ? '✅ All receipts verified!' : '❌ Verification failed!');
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
