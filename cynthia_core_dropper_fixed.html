function chunkText(t){
  // break at punctuation for breathing (lookbehind) - FIXED: single backslashes
  return t.split(/(?<=[\.\?\!\;])\s+/).filter(Boolean);
}

function speakText(text) {
  if (!text || !window.speechSynthesis) return;
  
  const chunks = chunkText(text);
  let index = 0;
  
  function speakNext() {
    if (index >= chunks.length) return;
    
    const utterance = new SpeechSynthesisUtterance(chunks[index]);
    utterance.rate = 0.9;
    utterance.pitch = 1.1;
    
    utterance.onend = () => {
      index++;
      setTimeout(speakNext, 200); // Brief pause between chunks
    };
    
    speechSynthesis.speak(utterance);
  }
  
  speakNext();
}

// Chat functionality
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const chatLog = document.getElementById('chatLog');
  
  if (!input.value.trim()) return;
  
  const userMessage = input.value;
  input.value = '';
  
  // Add user message to chat
  chatLog.innerHTML += `<div class="message user">You: ${userMessage}</div>`;
  
  try {
    const response = await fetch('/api/respond', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: userMessage})
    });
    
    const data = await response.json();
    
    if (data.success) {
      chatLog.innerHTML += `<div class="message cynthia">[${data.node}] ${data.reply}</div>`;
      speakText(data.reply);
    }
  } catch (error) {
    chatLog.innerHTML += `<div class="message error">Error: ${error.message}</div>`;
  }
  
  chatLog.scrollTop = chatLog.scrollHeight;
}

// Chart calculation
async function calculateChart() {
  const date = document.getElementById('birthDate').value;
  const time = document.getElementById('birthTime').value;
  const place = document.getElementById('birthPlace').value;
  
  if (!date || !time || !place) {
    alert('Please fill in all birth data fields');
    return;
  }
  
  try {
    const response = await fetch('/api/chart', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({date, time, place})
    });
    
    const data = await response.json();
    
    if (data.success) {
      displayChart(data.chart);
    }
  } catch (error) {
    console.error('Chart calculation failed:', error);
  }
}

function displayChart(chart) {
  const container = document.getElementById('chartDisplay');
  container.innerHTML = '<h3>Chart Analysis:</h3>';
  
  Object.entries(chart.nodes).forEach(([node, data]) => {
    container.innerHTML += `
      <div class="node-display">
        <h4>${node}</h4>
        <p>Sun: ${data.sun_gate} | Earth: ${data.earth_gate}</p>
        <p>Flow: ${(data.flow * 100).toFixed(0)}% | Stress: ${(data.stress * 100).toFixed(0)}%</p>
      </div>
    `;
  });
}

<script>
function download(path){
  // try both id styles: f_static/index.html and f_static_index.html
  const idSlash = 'f_'+path;
  const idUnd   = 'f_'+path.replaceAll('/','_');
  const ta = document.getElementById(idSlash) || document.getElementById(idUnd);
  if(!ta){ alert('Could not find: '+path); return; }
  const blob = new Blob([ta.value],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = path;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}
function copy(id){
  const ta = document.getElementById(id);
  if(!ta){ alert('Could not find: '+id); return; }
  ta.select();
  document.execCommand('copy');
}
</script>
